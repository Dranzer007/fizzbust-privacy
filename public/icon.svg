<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4E00"/>
      <stop offset="1" stop-color="#FF0055"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Squircle -->
  <rect width="512" height="512" rx="120" fill="url(#bg_grad)"/>
  
  <!-- Stylized Bottle -->
  <g filter="url(#glow)">
    <!-- Bottle Body -->
    <path d="M256 120C256 120 256 140 240 160C220 185 180 200 180 280V400C180 420 200 440 220 440H292C312 440 332 420 332 400V280C332 200 292 185 272 160C256 140 256 120 256 120Z" fill="white" fill-opacity="0.9"/>
    
    <!-- Cap Popping -->
    <rect x="236" y="80" width="40" height="20" rx="4" fill="white" transform="rotate(-15 256 90)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="2s" repeatCount="infinite" />
    </rect>
    
    <!-- Bubbles -->
    <circle cx="230" cy="100" r="10" fill="#00F5D4">
      <animate attributeName="cy" values="100; 40; 100" dur="1.5s" repeatCount="infinite" />
      <animate attributeName="opacity" values="0.8; 0; 0.8" dur="1.5s" repeatCount="infinite" />
    </circle>
    <circle cx="280" cy="110" r="8" fill="#00F5D4">
      <animate attributeName="cy" values="110; 50; 110" dur="1.8s" repeatCount="infinite" />
      <animate attributeName="opacity" values="0.8; 0; 0.8" dur="1.8s" repeatCount="infinite" />
    </circle>
    <circle cx="256" cy="70" r="12" fill="white">
      <animate attributeName="cy" values="70; 20; 70" dur="1.2s" repeatCount="infinite" />
      <animate attributeName="opacity" values="1; 0; 1" dur="1.2s" repeatCount="infinite" />
    </circle>
  </g>
  
  <!-- Text Detail -->
  <text x="256" y="340" font-family="Arial" font-weight="900" font-style="italic" font-size="40" fill="#FF4E00" text-anchor="middle" style="letter-spacing: 2px;">FIZZ</text>
</svg>
